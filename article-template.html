<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章標題 — 哥吉拉玩具圖鑑</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+TC:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C0392B;
    --dark: #0a0a0a;
    --charcoal: #1a1a1a;
    --gray: #2a2a2a;
    --light: #888;
    --pale: #ccc;
    --white: #f0ede8;
    --gold: #c9a84c;
    --atomic: #4af0a0;
    --font-title: 'Bebas Neue', sans-serif;
    --font-body: 'Noto Serif TC', serif;
    --font-mono: 'Share Tech Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); color: var(--white); font-family: var(--font-body); padding-bottom: 5rem; }

  nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(10,10,10,0.97);
    border-top: 1px solid var(--gray);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav a { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.7rem 0.5rem; text-decoration: none; gap: 0.25rem; }
  nav a .nav-icon { font-size: 1.3rem; }
  nav a .nav-label { font-family: var(--font-mono); font-size: 0.55rem; letter-spacing: 0.1em; color: var(--light); }
  nav a.active .nav-label { color: var(--red); }

  .article-hero {
    padding: 3rem 1.25rem 2rem;
    border-bottom: 1px solid var(--gray);
  }
  .article-meta { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 0.75rem; flex-wrap: wrap; }
  .article-date { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.2em; color: var(--red); }
  .article-tag { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.1em; color: var(--gold); border: 1px solid rgba(201,168,76,0.3); padding: 0.15rem 0.5rem; }
  .article-title { font-family: var(--font-title); font-size: clamp(2.5rem, 10vw, 4rem); letter-spacing: 0.04em; color: var(--white); line-height: 1.05; }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-family: var(--font-mono);
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    color: var(--red);
    text-decoration: none;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--gray);
    width: 100%;
  }

  .article-body {
    padding: 1.75rem 1.25rem;
    max-width: 680px;
  }
  .article-body p {
    font-size: 1rem;
    line-height: 1.95;
    color: var(--pale);
    margin-bottom: 1.4rem;
  }
  .article-body h2 {
    font-family: var(--font-title);
    font-size: 2rem;
    letter-spacing: 0.05em;
    color: var(--white);
    margin: 2.5rem 0 1rem;
    line-height: 1;
  }
  .article-body h3 {
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 1rem;
    color: var(--gold);
    margin: 2rem 0 0.75rem;
  }
  .article-body ul, .article-body ol {
    padding-left: 1.4rem;
    margin-bottom: 1.4rem;
  }
  .article-body li {
    font-size: 0.95rem;
    line-height: 1.85;
    color: var(--light);
    margin-bottom: 0.35rem;
  }
  .article-body img {
    width: 100%;
    border: 1px solid var(--gray);
    margin: 1.25rem 0;
  }
  .article-body strong { color: var(--white); font-weight: 700; }
  .article-body a { color: var(--gold); }

  .article-footer {
    margin: 0 1.25rem;
    padding: 1.5rem 0;
    border-top: 1px solid var(--gray);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .article-footer a {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    color: var(--red);
    text-decoration: none;
  }
</style>
</head>
<body>

<a class="back-link" href="articles.html">← 返回文章列表</a>

<div class="article-hero">
  <div class="article-meta">
    <!-- ★ 修改日期和分類 -->
    <span class="article-date">2025-06-01</span>
    <span class="article-tag">開箱評測</span>
  </div>
  <!-- ★ 修改文章標題 -->
  <h1 class="article-title">在這裡填入文章標題</h1>
</div>

<div class="article-body">
  <!-- ★ 在這裡填入文章內容 -->
  <!-- 段落用 <p> 包起來 -->
  <!-- 小標題用 <h2> 或 <h3> -->
  <!-- 圖片用 <img src="圖片網址"> -->

  <p>這裡是第一段內容。把這段文字換成你的文章內容。每個段落用 &lt;p&gt; 包起來就好。</p>

  <h2>這是小標題</h2>

  <p>這裡是小標題下面的段落。你可以繼續新增更多段落。</p>

  <p>這裡是第三段內容。想加幾段就加幾段。</p>

  <h3>這是更小的標題</h3>

  <p>繼續寫內容...</p>

  <ul>
    <li>這是清單第一項</li>
    <li>這是清單第二項</li>
    <li>這是清單第三項</li>
  </ul>

</div>

<div class="article-footer">
  <a href="articles.html">← 返回列表</a>
  <a href="index.html">回首頁 →</a>
</div>

<nav>
  <a href="index.html">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">首頁</span>
  </a>
  <a href="knowledge.html">
    <span class="nav-icon">📖</span>
    <span class="nav-label">知識庫</span>
  </a>
  <a href="guide.html">
    <span class="nav-icon">⭐</span>
    <span class="nav-label">收藏指南</span>
  </a>
  <a class="active" href="articles.html">
    <span class="nav-icon">✏️</span>
    <span class="nav-label">文章</span>
  </a>
</nav>

</body>
</html>
