<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>收藏文章 — 哥吉拉玩具圖鑑</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+TC:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C0392B; --dark: #0a0a0a; --charcoal: #1a1a1a; --gray: #2a2a2a;
    --light: #888; --pale: #ccc; --white: #f0ede8; --gold: #c9a84c;
    --font-title: 'Bebas Neue', sans-serif;
    --font-body: 'Noto Serif TC', serif;
    --font-mono: 'Share Tech Mono', monospace;
    --max-w: 740px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); color: var(--white); font-family: var(--font-body); padding-bottom: 5rem; }

  .top-nav { display: none; position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.97); border-bottom: 1px solid var(--gray); backdrop-filter: blur(8px); }
  .top-nav-inner { max-width: var(--max-w); margin: 0 auto; display: flex; align-items: center; padding: 0 1.5rem; }
  .top-nav-logo { font-family: var(--font-title); font-size: 1.1rem; letter-spacing: 0.12em; color: var(--red); text-decoration: none; padding: 1rem 1.5rem 1rem 0; border-right: 1px solid var(--gray); margin-right: 0.5rem; flex-shrink: 0; }
  .top-nav a.nav-item { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.18em; color: var(--light); text-decoration: none; padding: 1rem 0.85rem; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; white-space: nowrap; }
  .top-nav a.nav-item:hover { color: var(--white); }
  .top-nav a.nav-item.active { color: var(--white); border-bottom-color: var(--red); }
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.97); border-top: 1px solid var(--gray); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
  .bottom-nav a { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.7rem 0.5rem; text-decoration: none; gap: 0.25rem; }
  .bottom-nav a .nav-icon { font-size: 1.3rem; }
  .bottom-nav a .nav-label { font-family: var(--font-mono); font-size: 0.55rem; letter-spacing: 0.1em; color: var(--light); }
  .bottom-nav a.active .nav-label { color: var(--red); }

  .page-hero { max-width: var(--max-w); margin: 0 auto; padding: 3rem 1.25rem 1.75rem; border-bottom: 1px solid var(--gray); }
  .page-label { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.35em; color: var(--red); margin-bottom: 0.4rem; }
  .page-title { font-family: var(--font-title); font-size: 3.5rem; letter-spacing: 0.05em; color: var(--white); line-height: 1; margin-bottom: 0.5rem; }
  .page-desc { font-size: 0.85rem; line-height: 1.8; color: var(--light); }

  .filter-wrap { max-width: var(--max-w); margin: 0 auto; }
  .filter-bar { display: flex; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--gray); }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.15em; color: var(--light); background: none; border: none; border-bottom: 2px solid transparent; padding: 0.85rem 1rem; cursor: pointer; white-space: nowrap; transition: color 0.2s, border-color 0.2s; }
  .filter-btn.active { color: var(--white); border-bottom-color: var(--red); }

  .article-list { max-width: var(--max-w); margin: 0 auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1.25rem; }
  .article-card { background: var(--charcoal); border: 1px solid var(--gray); text-decoration: none; display: block; overflow: hidden; transition: border-color 0.2s; }
  .article-card:hover { border-color: var(--red); }
  .article-cover { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: var(--gray); }
  .article-cover-placeholder { width: 100%; aspect-ratio: 4/3; background: var(--gray); display: flex; align-items: center; justify-content: center; }
  .article-cover-placeholder span { font-family: var(--font-title); font-size: 5rem; color: rgba(255,255,255,0.06); }
  .article-info { padding: 1rem 1.25rem 1.25rem; }
  .article-meta { display: flex; gap: 0.6rem; align-items: center; margin-bottom: 0.5rem; flex-wrap: wrap; }
  .article-tag { font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.1em; color: var(--gold); border: 1px solid rgba(201,168,76,0.35); padding: 0.15rem 0.5rem; }
  .article-date { font-family: var(--font-mono); font-size: 0.58rem; color: var(--light); }
  .article-title { font-family: var(--font-title); font-size: 1.6rem; letter-spacing: 0.03em; color: var(--white); line-height: 1.1; margin-bottom: 0.5rem; }
  .article-excerpt { font-size: 0.83rem; line-height: 1.75; color: var(--light); }
  .empty-state { padding: 4rem 1.25rem; text-align: center; font-family: var(--font-mono); font-size: 0.7rem; letter-spacing: 0.2em; color: var(--gray); }

  @media (min-width: 768px) {
    .top-nav { display: block; }
    .bottom-nav { display: none; }
    body { padding-bottom: 0; }
    .article-list { flex-direction: row; flex-wrap: wrap; gap: 1.25rem; }
    .article-card { flex: 1 1 calc(50% - 0.625rem); min-width: 280px; }
    .article-cover { aspect-ratio: 16/9; }
    .article-cover-placeholder { aspect-ratio: 16/9; }
  }
</style>
</head>
<body>

<div class="top-nav">
  <div class="top-nav-inner">
    <a class="top-nav-logo" href="index.html">GODZILLA.TW</a>
    <a class="nav-item" href="index.html">首頁</a>
    <a class="nav-item" href="knowledge.html">知識庫</a>
    <a class="nav-item" href="guide.html">收藏指南</a>
    <a class="nav-item active" href="articles.html">收藏文章</a>
  </div>
</div>

<div class="page-hero">
  <p class="page-label">// 03 — ARTICLES</p>
  <h1 class="page-title">收藏文章</h1>
  <p class="page-desc">開箱評測、收藏心得、品牌介紹、市場資訊——持續更新的深度內容。</p>
</div>

<div class="filter-wrap">
  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterArticles('全部', this)">全部</button>
    <button class="filter-btn" onclick="filterArticles('哥吉拉介紹', this)">哥吉拉介紹</button>
    <button class="filter-btn" onclick="filterArticles('系列與時代解析', this)">系列與時代解析</button>
    <button class="filter-btn" onclick="filterArticles('玩具與收藏', this)">玩具與收藏</button>
    <button class="filter-btn" onclick="filterArticles('收藏市場與指南', this)">收藏市場與指南</button>
  </div>
</div>

<div class="article-list" id="articleList">
  <div class="empty-state">// 載入中...</div>
</div>

<nav class="bottom-nav">
  <a href="index.html"><span class="nav-icon">🏠</span><span class="nav-label">首頁</span></a>
  <a href="knowledge.html"><span class="nav-icon">📖</span><span class="nav-label">知識庫</span></a>
  <a href="guide.html"><span class="nav-icon">⭐</span><span class="nav-label">收藏指南</span></a>
  <a class="active" href="articles.html"><span class="nav-icon">✏️</span><span class="nav-label">文章</span></a>
</nav>

<script>
let allArticles = [];
async function loadArticles() {
  const list = document.getElementById('articleList');
  try {
    const res = await fetch('articles.json');
    allArticles = await res.json();
    if (!allArticles.length) { list.innerHTML = '<div class="empty-state">// 尚無文章</div>'; return; }
    allArticles.sort((a, b) => new Date(b.date) - new Date(a.date));
    renderArticles(allArticles);
  } catch { list.innerHTML = '<div class="empty-state">// 尚無文章</div>'; }
}
function renderArticles(articles) {
  const list = document.getElementById('articleList');
  if (!articles.length) { list.innerHTML = '<div class="empty-state">// 此分類尚無文章</div>'; return; }
  list.innerHTML = articles.map(a => `
    <a class="article-card" href="${a.file}" data-category="${a.category}">
      ${a.image
        ? `<img class="article-cover" src="${a.image}" alt="${a.title}" onerror="this.outerHTML='<div class=\\'article-cover-placeholder\\'><span>哥</span></div>'">`
        : `<div class="article-cover-placeholder"><span>哥</span></div>`}
      <div class="article-info">
        <div class="article-meta">
          <span class="article-tag">${a.category}</span>
          <span class="article-date">${a.date}</span>
        </div>
        <div class="article-title">${a.title}</div>
        <p class="article-excerpt">${a.excerpt}</p>
      </div>
    </a>
  `).join('');
}
function filterArticles(category, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderArticles(category === '全部' ? allArticles : allArticles.filter(a => a.category === category));
}
loadArticles();
</script>
</body>
</html>
