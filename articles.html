<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>收藏文章 — 哥吉拉玩具圖鑑</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+TC:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C0392B;
    --dark: #0a0a0a;
    --charcoal: #1a1a1a;
    --gray: #2a2a2a;
    --light: #888;
    --pale: #ccc;
    --white: #f0ede8;
    --gold: #c9a84c;
    --atomic: #4af0a0;
    --font-title: 'Bebas Neue', sans-serif;
    --font-body: 'Noto Serif TC', serif;
    --font-mono: 'Share Tech Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); color: var(--white); font-family: var(--font-body); padding-bottom: 5rem; }

  nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(10,10,10,0.97);
    border-top: 1px solid var(--gray);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav a { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.7rem 0.5rem; text-decoration: none; gap: 0.25rem; }
  nav a .nav-icon { font-size: 1.3rem; }
  nav a .nav-label { font-family: var(--font-mono); font-size: 0.55rem; letter-spacing: 0.1em; color: var(--light); }
  nav a.active .nav-label { color: var(--red); }

  .page-hero { padding: 3rem 1.25rem 2rem; border-bottom: 1px solid var(--gray); }
  .page-label { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.35em; color: var(--red); margin-bottom: 0.4rem; }
  .page-title { font-family: var(--font-title); font-size: 3.5rem; letter-spacing: 0.05em; color: var(--white); line-height: 1; margin-bottom: 0.6rem; }
  .page-desc { font-size: 0.85rem; line-height: 1.8; color: var(--light); }

  /* ARTICLE LIST */
  .article-list { display: flex; flex-direction: column; gap: 1px; background: var(--gray); border: 1px solid var(--gray); }
  .article-card {
    background: var(--dark);
    padding: 1.5rem 3rem 1.5rem 1.25rem;
    text-decoration: none;
    display: block;
    position: relative;
    transition: background 0.2s;
  }
  .article-card:active { background: var(--charcoal); }
  .article-date { font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.2em; color: var(--red); margin-bottom: 0.4rem; }
  .article-title { font-family: var(--font-title); font-size: 1.6rem; letter-spacing: 0.04em; color: var(--white); line-height: 1.1; margin-bottom: 0.3rem; }
  .article-tag { font-family: var(--font-mono); font-size: 0.58rem; letter-spacing: 0.1em; color: var(--gold); border: 1px solid rgba(201,168,76,0.3); padding: 0.15rem 0.45rem; display: inline-block; margin-bottom: 0.5rem; }
  .article-excerpt { font-size: 0.83rem; line-height: 1.7; color: var(--light); }
  .article-arrow { position: absolute; right: 1.25rem; top: 50%; transform: translateY(-50%); font-family: var(--font-mono); color: var(--red); font-size: 1.1rem; }

  .empty-state {
    padding: 4rem 1.25rem;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--gray);
  }

  /* HOW TO ADD */
  .how-to {
    margin: 2rem 1.25rem 0;
    background: var(--charcoal);
    border: 1px solid var(--gray);
    border-left: 3px solid var(--red);
    padding: 1.25rem;
  }
  .how-to-title { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.2em; color: var(--red); margin-bottom: 0.75rem; }
  .how-to-text { font-size: 0.82rem; line-height: 1.8; color: var(--light); }
  .how-to-text code { font-family: var(--font-mono); font-size: 0.75rem; color: var(--atomic); background: rgba(74,240,160,0.08); padding: 0.1rem 0.35rem; }
</style>
</head>
<body>

<div class="page-hero">
  <p class="page-label">// 03 — ARTICLES</p>
  <h1 class="page-title">收藏文章</h1>
  <p class="page-desc">開箱評測、收藏心得、市場分析——持續更新的深度內容。</p>
</div>

<div style="padding: 1.5rem 1.25rem 0;">
  <div class="article-list" id="articleList">
    <!-- 在下方 articles 陣列新增文章 -->
  </div>
</div>

<div class="how-to">
  <div class="how-to-title">// 如何新增文章</div>
  <p class="how-to-text">
    1. 在 GitHub 新增一個 HTML 檔案，例如 <code>article-01.html</code>，貼上文章模板並修改內容。<br><br>
    2. 回到這個檔案（<code>articles.html</code>），在下方 <code>articles</code> 陣列加入一行，網站就會自動顯示新文章。
  </p>
</div>

<nav>
  <a href="index.html">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">首頁</span>
  </a>
  <a href="knowledge.html">
    <span class="nav-icon">📖</span>
    <span class="nav-label">知識庫</span>
  </a>
  <a href="guide.html">
    <span class="nav-icon">⭐</span>
    <span class="nav-label">收藏指南</span>
  </a>
  <a class="active" href="articles.html">
    <span class="nav-icon">✏️</span>
    <span class="nav-label">文章</span>
  </a>
</nav>

<script>
// ↓↓↓ 每次新增文章，在這裡加一行 ↓↓↓
const articles = [
  // 格式範例（複製這行，拿掉最前面的 // 並修改內容）：
  // { title: "文章標題", date: "2025-06-01", category: "開箱評測", excerpt: "這裡寫摘要", file: "article-01.html" },
];
// ↑↑↑ 加在這行上面 ↑↑↑

const list = document.getElementById('articleList');
if (articles.length === 0) {
  list.innerHTML = '<div class="empty-state">// 尚無文章<br>NO ARTICLES YET</div>';
} else {
  articles.sort((a, b) => new Date(b.date) - new Date(a.date));
  list.innerHTML = articles.map(a => `
    <a class="article-card" href="${a.file}">
      <div class="article-date">${a.date}</div>
      <div class="article-title">${a.title}</div>
      <span class="article-tag">${a.category}</span>
      <p class="article-excerpt">${a.excerpt}</p>
      <span class="article-arrow">→</span>
    </a>
  `).join('');
}
</script>
</body>
</html>
