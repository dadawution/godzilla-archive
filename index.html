<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>怪獸誌 KAIJUZINE</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--red:#C0392B;--dark:#0a0a0a;--charcoal:#111;--gray:#1a1a1a;--border:#222;--light:#666;--pale:#999;--white:#f0ede8;--gold:#c9a84c;--font-body:'Noto Serif TC',serif;--font-mono:'Share Tech Mono',monospace;--max-w:1100px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--white);font-family:var(--font-body)}
.logo{display:flex;align-items:center;gap:0.5rem;text-decoration:none}
.logo-kz{font-family:'Arial Black',sans-serif;font-size:1.8rem;color:#C0392B;line-height:1;font-weight:900;border-right:2px solid #C0392B;padding-right:0.5rem;letter-spacing:0.02em}
.logo-text{display:flex;flex-direction:column;gap:0.1rem;padding-left:0.05rem}
.logo-zh{font-family:'Arial Black',sans-serif;font-size:0.92rem;color:var(--white);letter-spacing:0.12em;font-weight:900;line-height:1}
.logo-en{font-family:var(--font-mono);font-size:0.36rem;letter-spacing:0.06em;color:#555}
.top-nav{display:none;position:sticky;top:0;z-index:200;background:rgba(10,10,10,0.97);border-bottom:1px solid var(--border);backdrop-filter:blur(10px)}
.top-nav-inner{max-width:var(--max-w);margin:0 auto;display:flex;align-items:stretch}
.top-nav-logo{padding:0.7rem 1.25rem;border-right:1px solid var(--border);display:flex;align-items:center}
.top-nav-cats{display:flex;align-items:stretch;overflow-x:auto;scrollbar-width:none}
.top-nav-cats::-webkit-scrollbar{display:none}
.cat-btn{font-family:var(--font-mono);font-size:0.58rem;letter-spacing:0.18em;color:#555;background:none;border:none;border-bottom:2px solid transparent;padding:0 1rem;cursor:pointer;white-space:nowrap;transition:color .2s,border-color .2s}
.cat-btn:hover{color:var(--white)}
.cat-btn.active{color:var(--white);border-bottom-color:var(--red)}
.mobile-nav{display:flex;align-items:center;justify-content:space-between;padding:0.9rem 1.25rem;border-bottom:1px solid var(--border);background:var(--dark);position:sticky;top:0;z-index:200}
.mobile-logo{display:flex;align-items:center;gap:0.5rem;text-decoration:none}
.mobile-logo-kz-wrap{display:flex;flex-direction:column;align-items:center;gap:0.04rem;border-right:2px solid #C0392B;padding-right:0.5rem}
.mobile-logo-kz{font-family:'Arial Black',sans-serif;font-size:1.7rem;color:#C0392B;line-height:1;font-weight:900}
.mobile-logo-kz-en{font-family:var(--font-mono);font-size:0.3rem;letter-spacing:0.28em;color:#C0392B}
.mobile-logo-zh{font-family:'Arial Black',sans-serif;font-size:1.1rem;color:var(--white);letter-spacing:0.1em;font-weight:900}
.burger{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;gap:5px;padding:6px}
.burger span{display:block;width:24px;height:2px;background:var(--white);transition:all 0.25s}
.burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.burger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;inset:0;background:rgba(10,10,10,0.98);z-index:190;flex-direction:column;justify-content:center;align-items:center;gap:0}
.mobile-menu.open{display:flex}
.mobile-menu-label{font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.35em;color:#444;margin-bottom:2rem}
.mobile-menu-item{font-family:'Arial Black',sans-serif;font-size:1.9rem;color:#2a2a2a;font-weight:900;letter-spacing:0.04em;padding:0.55rem 2.5rem;cursor:pointer;transition:color 0.15s;text-align:center;width:100%}
.mobile-menu-item:hover,.mobile-menu-item.active{color:var(--white)}
.mobile-menu-item.active{border-left:3px solid var(--red);padding-left:calc(2.5rem - 3px)}
.content-wrap{max-width:var(--max-w);margin:0 auto;padding-bottom:3rem}
.section-bar{display:flex;align-items:center;gap:0.75rem;padding:0.55rem 1rem;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.section-bar-line{flex:1;height:1px;background:var(--border)}
.section-bar-text{font-family:var(--font-mono);font-size:0.5rem;letter-spacing:0.3em;color:#333;white-space:nowrap}
.hero-strip{display:flex;flex-direction:column;gap:1px;background:var(--gray)}
.hero-main{background:var(--charcoal);cursor:pointer;text-decoration:none;display:block;overflow:hidden}
.hero-main:hover .card-cover{transform:scale(1.03)}
.card-cover{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--gray);transition:transform 0.4s ease}
.card-cover-ph{width:100%;aspect-ratio:16/9;background:var(--gray);display:flex;align-items:center;justify-content:center}
.card-cover-ph span{font-family:'Arial Black',sans-serif;font-size:4rem;color:#1e1e1e;font-weight:900}
.hero-body{padding:1rem 1.25rem 1.25rem}
.card-tag{font-family:var(--font-mono);font-size:0.52rem;letter-spacing:0.2em;color:var(--red);display:block;margin-bottom:0.4rem}
.hero-title{font-family:'Arial Black',sans-serif;font-size:1.3rem;color:var(--white);line-height:1.2;font-weight:900;margin-bottom:0.45rem}
.hero-excerpt{font-size:0.8rem;color:var(--light);line-height:1.7}
.card-date{font-family:var(--font-mono);font-size:0.48rem;color:#3a3a3a;display:block;margin-top:0.5rem}
.side-list{display:flex;flex-direction:column;gap:1px;background:var(--gray)}
.side-card{background:var(--charcoal);text-decoration:none;display:flex;overflow:hidden;cursor:pointer}
.side-card:hover .side-card-img{transform:scale(1.04)}
.side-card-img-wrap{width:110px;flex-shrink:0;overflow:hidden}
.side-card-img{width:100%;height:100%;object-fit:cover;display:block;background:var(--gray);transition:transform 0.35s ease;min-height:90px}
.side-card-img-ph{width:110px;flex-shrink:0;background:var(--gray);display:flex;align-items:center;justify-content:center;min-height:90px}
.side-card-img-ph span{font-family:'Arial Black',sans-serif;font-size:1.8rem;color:#1e1e1e;font-weight:900}
.side-card-body{padding:0.65rem 0.9rem;flex:1}
.side-card-tag{font-family:var(--font-mono);font-size:0.48rem;letter-spacing:0.16em;color:var(--red);display:block;margin-bottom:0.3rem}
.side-card-title{font-family:'Arial Black',sans-serif;font-size:0.82rem;color:var(--pale);line-height:1.3;font-weight:900}
.side-card-date{font-family:var(--font-mono);font-size:0.44rem;color:#333;display:block;margin-top:0.35rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--gray)}
.grid-card{background:var(--charcoal);text-decoration:none;display:block;overflow:hidden;cursor:pointer}
.grid-card:hover .card-cover{transform:scale(1.03)}
.grid-card .card-cover{aspect-ratio:4/3}
.grid-card .card-cover-ph{aspect-ratio:4/3}
.grid-card .card-cover-ph span{font-size:2.5rem}
.grid-body{padding:0.75rem 1rem 0.9rem}
.grid-title{font-family:'Arial Black',sans-serif;font-size:0.9rem;color:var(--pale);line-height:1.3;font-weight:900;margin-bottom:0.25rem}
.empty{padding:4rem 1.25rem;text-align:center;font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.2em;color:#333}
.mobile-feed{display:none;flex-direction:column;padding:1.5rem 1.25rem;gap:0}
.mobile-card{text-decoration:none;display:block;padding:1.75rem 0}
.mobile-card+.mobile-card{border-top:1px solid var(--border)}
.mobile-card-img-wrap{overflow:hidden;margin-bottom:1rem}
.mobile-card-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:var(--gray);transition:transform 0.35s}
.mobile-card:active .mobile-card-img{transform:scale(1.02)}
.mobile-card-img-ph{width:100%;aspect-ratio:4/3;background:var(--gray);display:flex;align-items:center;justify-content:center}
.mobile-card-img-ph span{font-family:'Arial Black',sans-serif;font-size:3rem;color:#1e1e1e;font-weight:900}
.mobile-card-tag{font-family:var(--font-mono);font-size:0.58rem;letter-spacing:0.2em;color:var(--red);display:block;margin-bottom:0.45rem}
.mobile-card-title{font-family:'Arial Black',sans-serif;font-size:1.3rem;color:var(--white);line-height:1.25;font-weight:900;margin-bottom:0.6rem}
.mobile-card-excerpt{font-size:0.92rem;line-height:1.8;color:var(--light);margin-bottom:0.5rem}
.mobile-card-date{font-family:var(--font-mono);font-size:0.55rem;color:#444;display:block}
@media(min-width:768px){
  .top-nav{display:block}
  .mobile-nav,.mobile-menu,.mobile-feed{display:none!important}
  .hero-strip{flex-direction:row}
  .hero-main{flex:1;min-width:0}
  .hero-main .card-cover{aspect-ratio:4/3}
  .hero-main .card-cover-ph{aspect-ratio:4/3}
  .hero-title{font-size:1.5rem}
  .side-list{width:260px;flex-shrink:0}
  .side-card{flex-direction:column}
  .side-card-img-wrap{width:100%;height:110px}
  .side-card-img-ph{width:100%;height:110px;min-height:unset}
  .side-card-img{min-height:unset;height:110px}
}
@media(max-width:767px){
  .content-wrap .hero-strip,.content-wrap .section-bar,#moreGrid{display:none!important}
  .mobile-feed{display:flex}
  .content-wrap{padding-bottom:1.5rem}
}
</style>
</head>
<body>

<div class="top-nav">
  <div class="top-nav-inner">
    <div class="top-nav-logo">
      <a class="logo" href="index.html">
        <span class="logo-kz">KZ</span>
        <div class="logo-text"><span class="logo-zh">怪獸誌</span><span class="logo-en">KAIJUZINE</span></div>
      </a>
    </div>
    <div class="top-nav-cats" id="desktopCats">
      <button class="cat-btn active" onclick="filterArticles('全部',this)">全部</button>
      <button class="cat-btn" onclick="filterArticles('哥吉拉介紹',this)">哥吉拉介紹</button>
      <button class="cat-btn" onclick="filterArticles('系列與時代解析',this)">系列與時代解析</button>
      <button class="cat-btn" onclick="filterArticles('玩具與收藏',this)">玩具與收藏</button>
      <button class="cat-btn" onclick="filterArticles('收藏市場與指南',this)">收藏市場與指南</button>
    </div>
  </div>
</div>

<div class="mobile-nav">
  <a class="mobile-logo" href="index.html">
    <div class="mobile-logo-kz-wrap">
      <span class="mobile-logo-kz">KZ</span>
      <span class="mobile-logo-kz-en">KAIJUZINE</span>
    </div>
    <span class="mobile-logo-zh">怪獸誌</span>
  </a>
  <button class="burger" id="burgerBtn" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
</div>

<div class="mobile-menu" id="mobileMenu">
  <div class="mobile-menu-label">// 文章分類</div>
  <div class="mobile-menu-item active" onclick="mobileCat('全部',this)">全部</div>
  <div class="mobile-menu-item" onclick="mobileCat('哥吉拉介紹',this)">哥吉拉介紹</div>
  <div class="mobile-menu-item" onclick="mobileCat('系列與時代解析',this)">系列與時代解析</div>
  <div class="mobile-menu-item" onclick="mobileCat('玩具與收藏',this)">玩具與收藏</div>
  <div class="mobile-menu-item" onclick="mobileCat('收藏市場與指南',this)">收藏市場與指南</div>
</div>

<div class="content-wrap">
  <div class="hero-strip" id="heroStrip"><div class="empty">// 載入中...</div></div>
  <div class="section-bar" id="sectionBar" style="display:none">
    <div class="section-bar-line"></div>
    <div class="section-bar-text">更多文章</div>
    <div class="section-bar-line"></div>
  </div>
  <div id="moreGrid"></div>
</div>

<div class="mobile-feed" id="mobileFeed">
  <div class="empty">// 載入中...</div>
</div>

<script>
let allArticles=[];
async function loadArticles(){
  try{
    const res=await fetch('articles.json');
    allArticles=await res.json();
    allArticles.sort((a,b)=>new Date(b.date)-new Date(a.date));
    renderDesktop(allArticles);renderMobile(allArticles);
  }catch{
    document.getElementById('heroStrip').innerHTML='<div class="empty">// 尚無文章</div>';
    document.getElementById('mobileFeed').innerHTML='<div class="empty">// 尚無文章</div>';
  }
}
function renderDesktop(articles){
  const hero=document.getElementById('heroStrip');
  const more=document.getElementById('moreGrid');
  const bar=document.getElementById('sectionBar');
  if(!articles.length){hero.innerHTML='<div class="empty">// 此分類尚無文章</div>';more.innerHTML='';bar.style.display='none';return;}
  const[first,...rest]=articles;
  hero.innerHTML=`
    <a class="hero-main" href="${first.file}">
      ${first.image?`<img class="card-cover" src="${first.image}" alt="${first.title}" onerror="this.outerHTML='<div class=\\'card-cover-ph\\'><span>哥</span></div>'">`:`<div class="card-cover-ph"><span>哥</span></div>`}
      <div class="hero-body">
        <span class="card-tag">${first.category}</span>
        <div class="hero-title">${first.title}</div>
        <div class="hero-excerpt">${first.excerpt}</div>
        <span class="card-date">${first.date}</span>
      </div>
    </a>
    ${rest.slice(0,3).length?`<div class="side-list">${rest.slice(0,3).map(a=>`
      <a class="side-card" href="${a.file}">
        ${a.image?`<div class="side-card-img-wrap"><img class="side-card-img" src="${a.image}" alt="${a.title}" onerror="this.parentElement.outerHTML='<div class=\\'side-card-img-ph\\'><span>哥</span></div>'"></div>`:`<div class="side-card-img-ph"><span>哥</span></div>`}
        <div class="side-card-body"><span class="side-card-tag">${a.category}</span><div class="side-card-title">${a.title}</div><span class="side-card-date">${a.date}</span></div>
      </a>`).join('')}</div>`:''}`;
  const g=rest.slice(3);
  if(g.length){bar.style.display='flex';more.innerHTML=`<div class="grid-3">${g.map(a=>`
    <a class="grid-card" href="${a.file}">
      ${a.image?`<img class="card-cover" src="${a.image}" alt="${a.title}" onerror="this.outerHTML='<div class=\\'card-cover-ph\\'><span>哥</span></div>'">`:`<div class="card-cover-ph"><span>哥</span></div>`}
      <div class="grid-body"><span class="card-tag">${a.category}</span><div class="grid-title">${a.title}</div><span class="card-date">${a.date}</span></div>
    </a>`).join('')}</div>`;}
  else{bar.style.display='none';more.innerHTML='';}
}
function renderMobile(articles){
  const feed=document.getElementById('mobileFeed');
  if(!articles.length){feed.innerHTML='<div class="empty">// 此分類尚無文章</div>';return;}
  feed.innerHTML=articles.map(a=>`
    <a class="mobile-card" href="${a.file}">
      <div class="mobile-card-img-wrap">
        ${a.image?`<img class="mobile-card-img" src="${a.image}" alt="${a.title}" onerror="this.parentElement.outerHTML='<div class=\\'mobile-card-img-ph\\'><span>哥</span></div>'">`:`<div class="mobile-card-img-ph"><span>哥</span></div>`}
      </div>
      <span class="mobile-card-tag">${a.category}</span>
      <div class="mobile-card-title">${a.title}</div>
      <p class="mobile-card-excerpt">${a.excerpt}</p>
      <span class="mobile-card-date">${a.date}</span>
    </a>`).join('');
}
function filterArticles(cat,btn){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const f=cat==='全部'?allArticles:allArticles.filter(a=>a.category===cat);
  renderDesktop(f);renderMobile(f);
}
function mobileCat(cat,el){
  document.querySelectorAll('.mobile-menu-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  filterArticles(cat,null);
  toggleMenu();
}
function toggleMenu(){
  const m=document.getElementById('mobileMenu');
  const b=document.getElementById('burgerBtn');
  m.classList.toggle('open');
  b.classList.toggle('open');
  document.body.style.overflow=m.classList.contains('open')?'hidden':'';
}
loadArticles();
</script>
</body>
</html>
