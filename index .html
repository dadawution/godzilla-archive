<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>怪獸誌 KAIJUZINE</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--red:#C0392B;--dark:#0a0a0a;--charcoal:#111;--gray:#1a1a1a;--border:#1e1e1e;--light:#666;--pale:#999;--white:#f0ede8;--gold:#c9a84c;--font-body:'Noto Serif TC',serif;--font-mono:'Share Tech Mono',monospace;--max-w:1100px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:var(--white);font-family:var(--font-body)}

/* ── DESKTOP NAV ── */
.top-nav{display:none;position:sticky;top:0;z-index:200;background:rgba(10,10,10,0.97);border-bottom:1px solid var(--border);backdrop-filter:blur(10px)}
.top-nav-inner{max-width:var(--max-w);margin:0 auto;display:flex;align-items:stretch}
.top-nav-logo-wrap{padding:0 1.25rem;border-right:1px solid var(--border);display:flex;align-items:center}
.top-nav-logo{display:flex;flex-direction:column;align-items:center;gap:0.06rem;text-decoration:none}
.top-nav-logo-zh{font-family:'Arial Black',sans-serif;font-size:0.85rem;color:var(--white);letter-spacing:0.1em;font-weight:900;line-height:1;border-bottom:1px solid #333;padding-bottom:0.08rem}
.top-nav-logo-en{font-family:var(--font-mono);font-size:0.26rem;letter-spacing:0.3em;color:#555}
.top-nav-cats{display:flex;align-items:stretch;overflow-x:auto;scrollbar-width:none}
.top-nav-cats::-webkit-scrollbar{display:none}
.cat-btn{font-family:var(--font-mono);font-size:0.58rem;letter-spacing:0.18em;color:#555;background:none;border:none;border-bottom:2px solid transparent;padding:0 1rem;cursor:pointer;white-space:nowrap;transition:color .2s,border-color .2s}
.cat-btn:hover{color:var(--white)}
.cat-btn.active{color:var(--white);border-bottom-color:var(--red)}

/* ── MOBILE NAV ── */
.mobile-nav{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1.25rem;border-bottom:1px solid var(--border);background:var(--dark);position:sticky;top:0;z-index:200}
.mobile-burger{display:flex;flex-direction:column;gap:5px;padding:4px;background:none;border:none;cursor:pointer;width:32px}
.mobile-burger span{display:block;width:22px;height:2px;background:var(--white);transition:all 0.25s}
.mobile-burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.mobile-burger.open span:nth-child(2){opacity:0}
.mobile-burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-logo{display:flex;flex-direction:column;align-items:center;gap:0.1rem;text-decoration:none}
.mobile-logo-zh{font-family:'Arial Black',sans-serif;font-size:1.5rem;color:var(--white);line-height:1;font-weight:900;letter-spacing:0.06em;border-bottom:1px solid #333;padding-bottom:0.12rem}
.mobile-logo-en{font-family:var(--font-mono);font-size:0.42rem;letter-spacing:0.4em;color:#555}
.mobile-search{font-size:1.1rem;width:32px;text-align:right;background:none;border:none;cursor:pointer;color:var(--white)}

/* ── MOBILE MENU ── */
.mobile-menu{display:none;position:fixed;inset:0;background:rgba(10,10,10,0.98);z-index:190;flex-direction:column;justify-content:center;align-items:center}
.mobile-menu.open{display:flex}
.mobile-menu-label{font-family:var(--font-mono);font-size:0.6rem;letter-spacing:0.35em;color:#444;margin-bottom:2rem}
.mobile-menu-item{font-family:'Arial Black',sans-serif;font-size:1.9rem;color:#2a2a2a;font-weight:900;letter-spacing:0.04em;padding:0.55rem 2.5rem;cursor:pointer;transition:color 0.15s;text-align:center;width:100%}
.mobile-menu-item:hover,.mobile-menu-item.active{color:var(--white)}
.mobile-menu-item.active{border-left:3px solid var(--red);padding-left:calc(2.5rem - 3px)}

/* ── DESKTOP CONTENT ── */
.content-wrap{max-width:var(--max-w);margin:0 auto;padding-bottom:3rem}
.hero-strip{display:flex;flex-direction:column;gap:1px;background:var(--gray)}
.hero-main{background:var(--charcoal);cursor:pointer;text-decoration:none;display:block;overflow:hidden}
.hero-main:hover .card-cover{transform:scale(1.03)}
.card-cover{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--gray);transition:transform 0.4s ease}
.card-cover-ph{width:100%;aspect-ratio:16/9;background:var(--gray);display:flex;align-items:center;justify-content:center}
.card-cover-ph span{font-family:'Arial Black',sans-serif;font-size:4rem;color:#1e1e1e;font-weight:900}
.hero-body{padding:1rem 1.25rem 1.25rem}
.card-tag{font-family:var(--font-mono);font-size:0.52rem;letter-spacing:0.2em;color:var(--red);display:block;margin-bottom:0.4rem}
.hero-title{font-family:'Arial Black',sans-serif;font-size:1.3rem;color:var(--white);line-height:1.2;font-weight:900;margin-bottom:0.45rem}
.hero-excerpt{font-size:0.8rem;color:var(--light);line-height:1.7}
.card-date{font-family:var(--font-mono);font-size:0.48rem;color:#3a3a3a;display:block;margin-top:0.5rem}
.side-list{display:flex;flex-direction:column;gap:1px;background:var(--gray)}
.side-card{background:var(--charcoal);text-decoration:none;display:flex;overflow:hidden;cursor:pointer;align-items:stretch}
.side-card:hover .side-card-img{transform:scale(1.04)}
.side-card-img-wrap{width:90px;flex-shrink:0;overflow:hidden}
.side-card-img{width:90px;height:100%;object-fit:cover;display:block;background:var(--gray);transition:transform 0.35s ease;min-height:75px}
.side-card-img-ph{width:90px;flex-shrink:0;background:var(--gray);display:flex;align-items:center;justify-content:center;min-height:75px}
.side-card-img-ph span{font-family:'Arial Black',sans-serif;font-size:1.4rem;color:#1e1e1e;font-weight:900}
.side-card-body{padding:0.6rem 0.75rem;flex:1;border-left:1px solid var(--gray);display:flex;flex-direction:column;justify-content:center}
.side-card-tag{font-family:var(--font-mono);font-size:0.46rem;letter-spacing:0.14em;color:var(--red);display:block;margin-bottom:0.28rem}
.side-card-title{font-family:'Arial Black',sans-serif;font-size:0.76rem;color:var(--pale);line-height:1.3;font-weight:900}
.side-card-date{font-family:var(--font-mono);font-size:0.42rem;color:#333;display:block;margin-top:0.28rem}
.grid-3{display:flex;flex-direction:column;gap:0}
.grid-card{background:var(--dark);text-decoration:none;display:flex;gap:1rem;padding:1rem 1.25rem;border-bottom:1px solid var(--border);align-items:flex-start;cursor:pointer;transition:background 0.15s}
.grid-card:hover{background:var(--charcoal)}
.grid-card .card-cover{width:140px;flex-shrink:0;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--gray)}
.grid-card .card-cover-ph{width:140px;flex-shrink:0;aspect-ratio:16/9;background:var(--gray);display:flex;align-items:center;justify-content:center}
.grid-card .card-cover-ph span{font-size:1.8rem}
.grid-body{flex:1;min-width:0}
.grid-title{font-family:'Arial Black',sans-serif;font-size:0.95rem;color:var(--pale);line-height:1.35;font-weight:900;margin-bottom:0.3rem}
.section-bar{display:flex;align-items:center;gap:0.6rem;padding:1.25rem;border-bottom:1px solid var(--border)}
.section-bar-line{width:3px;height:1rem;background:var(--red);flex-shrink:0}
.section-bar-text{font-family:'Arial Black',sans-serif;font-size:0.88rem;color:var(--white);font-weight:900;letter-spacing:0.05em}
.empty{padding:4rem 1.25rem;text-align:center;font-family:var(--font-mono);font-size:0.65rem;letter-spacing:0.2em;color:#333}

/* ── MOBILE FEED ── */
.mobile-feed{display:none;flex-direction:column;padding:0 1.25rem}

/* Hero card */
.m-hero{text-decoration:none;display:block;padding:1.25rem 0 0}
.m-hero-img-wrap{overflow:hidden}
.m-hero-img{width:100%;aspect-ratio:3/2;object-fit:cover;display:block;background:var(--gray)}
.m-hero-img-ph{width:100%;aspect-ratio:3/2;background:var(--gray);display:flex;align-items:center;justify-content:center}
.m-hero-img-ph span{font-family:'Arial Black',sans-serif;font-size:4rem;color:#1e1e1e;font-weight:900}
.m-hero-label{display:flex;align-items:center;gap:0.6rem;padding:0.85rem 0 0.6rem;border-bottom:1px solid var(--red)}
.m-hero-label-line{width:22px;height:2px;background:var(--red);flex-shrink:0}
.m-hero-label-text{font-family:var(--font-mono);font-size:0.52rem;letter-spacing:0.22em;color:var(--red)}
.m-hero-title{font-family:'Arial Black',sans-serif;font-size:1.4rem;color:var(--white);line-height:1.22;font-weight:900;margin:0.7rem 0 0.5rem}
.m-hero-meta{display:flex;align-items:center;justify-content:space-between;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
.m-hero-date{font-family:var(--font-mono);font-size:0.5rem;color:#444}
.m-hero-arrow{font-family:var(--font-mono);font-size:0.65rem;color:var(--red)}

/* Two col */
.m-two-col{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--gray);margin:1.25rem -1.25rem}
.m-two-card{background:var(--charcoal);text-decoration:none;display:block;overflow:hidden}
.m-two-img{width:100%;aspect-ratio:4/3;background:var(--gray);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.m-two-img img{width:100%;height:100%;object-fit:cover;display:block}
.m-two-img span{font-family:'Arial Black',sans-serif;font-size:2rem;color:#1e1e1e;font-weight:900}
.m-two-img-tag{position:absolute;top:0.5rem;left:0.5rem;background:var(--red);font-family:var(--font-mono);font-size:0.42rem;letter-spacing:0.1em;color:#fff;padding:0.15rem 0.4rem}
.m-two-body{padding:0.65rem 0.75rem 0.75rem}
.m-two-title{font-family:'Arial Black',sans-serif;font-size:0.8rem;color:var(--pale);line-height:1.3;font-weight:900;margin-bottom:0.3rem}
.m-two-date{font-family:var(--font-mono);font-size:0.44rem;color:#444;display:block}

/* List header */
.m-list-header{display:flex;align-items:center;gap:0.6rem;padding:1.25rem 0 0.75rem}
.m-list-header-line{width:3px;height:1rem;background:var(--red);flex-shrink:0}
.m-list-header-text{font-family:'Arial Black',sans-serif;font-size:0.85rem;color:var(--white);font-weight:900;letter-spacing:0.05em}

/* List cards */
.m-list-card{display:flex;gap:0.85rem;padding:1rem 0;text-decoration:none;border-bottom:1px solid var(--border);align-items:flex-start}
.m-list-img{width:110px;flex-shrink:0;overflow:hidden}
.m-list-img img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:var(--gray)}
.m-list-img-ph{width:110px;aspect-ratio:4/3;background:var(--gray);display:flex;align-items:center;justify-content:center}
.m-list-img-ph span{font-family:'Arial Black',sans-serif;font-size:1.5rem;color:#1e1e1e;font-weight:900}
.m-list-body{flex:1;min-width:0}
.m-list-tag{font-family:var(--font-mono);font-size:0.5rem;letter-spacing:0.15em;color:var(--red);display:block;margin-bottom:0.3rem}
.m-list-title{font-family:'Arial Black',sans-serif;font-size:0.92rem;color:var(--pale);line-height:1.35;font-weight:900;margin-bottom:0.35rem}
.m-list-date{font-family:var(--font-mono);font-size:0.46rem;color:#444}

/* ── RESPONSIVE ── */
@media(min-width:768px){
  .top-nav{display:block}
  .mobile-nav,.mobile-menu,.mobile-feed{display:none!important}
  .hero-strip{flex-direction:row}
  .hero-main{flex:1;min-width:0}
  .hero-main .card-cover{aspect-ratio:4/3}
  .hero-main .card-cover-ph{aspect-ratio:4/3}
  .hero-title{font-size:1.5rem}
  .side-list{width:260px;flex-shrink:0}
  .side-card{flex-direction:row}
}
@media(max-width:767px){
  .content-wrap .hero-strip,.content-wrap .section-bar,#moreGrid{display:none!important}
  .mobile-feed{display:flex}
  .content-wrap{padding-bottom:1rem}
}
</style>
</head>
<body>

<!-- DESKTOP NAV -->
<div class="top-nav">
  <div class="top-nav-inner">
    <div class="top-nav-logo-wrap">
      <a class="top-nav-logo" href="index.html">
        <span class="top-nav-logo-zh">怪獸誌</span>
        <span class="top-nav-logo-en">KAIJUZINE</span>
      </a>
    </div>
    <div class="top-nav-cats">
      <button class="cat-btn active" onclick="filterArticles('全部',this)">全部</button>
      <button class="cat-btn" onclick="filterArticles('哥吉拉介紹',this)">哥吉拉介紹</button>
      <button class="cat-btn" onclick="filterArticles('系列與時代解析',this)">系列與時代解析</button>
      <button class="cat-btn" onclick="filterArticles('玩具與收藏',this)">玩具與收藏</button>
      <button class="cat-btn" onclick="filterArticles('收藏市場與指南',this)">收藏市場與指南</button>
    </div>
  </div>
</div>

<!-- MOBILE NAV -->
<div class="mobile-nav">
  <button class="mobile-burger" id="burgerBtn" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
  <a class="mobile-logo" href="index.html">
    <span class="mobile-logo-zh">怪獸誌</span>
    <span class="mobile-logo-en">KAIJUZINE</span>
  </a>
  <button class="mobile-search">🔍</button>
</div>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobileMenu">
  <div class="mobile-menu-label">// 文章分類</div>
  <div class="mobile-menu-item active" onclick="mobileCat('全部',this)">全部</div>
  <div class="mobile-menu-item" onclick="mobileCat('哥吉拉介紹',this)">哥吉拉介紹</div>
  <div class="mobile-menu-item" onclick="mobileCat('系列與時代解析',this)">系列與時代解析</div>
  <div class="mobile-menu-item" onclick="mobileCat('玩具與收藏',this)">玩具與收藏</div>
  <div class="mobile-menu-item" onclick="mobileCat('收藏市場與指南',this)">收藏市場與指南</div>
</div>

<!-- DESKTOP CONTENT -->
<div class="content-wrap">
  <div class="hero-strip" id="heroStrip"><div class="empty">// 載入中...</div></div>
  <div class="section-bar" id="sectionBar" style="display:none">
    <div class="section-bar-line"></div><div class="section-bar-text">更多文章</div><div class="section-bar-line"></div>
  </div>
  <div id="moreGrid"></div>
</div>

<!-- MOBILE FEED -->
<div class="mobile-feed" id="mobileFeed">
  <div class="empty">// 載入中...</div>
</div>

<script>
let allArticles=[];

function ph(cls){ return '<div class="'+cls+'"><span>哥</span></div>'; }
function img(src,alt,cls,phCls){
  if(!src) return ph(phCls);
  return '<img class="'+cls+'" src="'+src+'" alt="'+alt+'" onerror="this.style.visibility='hidden';this.parentElement.style.background='#1a1a1a'">';
}

async function loadArticles(){
  try{
    const res=await fetch('articles.json');
    allArticles=await res.json();
    allArticles.sort((a,b)=>new Date(b.date)-new Date(a.date));
    renderDesktop(allArticles);
    renderMobile(allArticles);
  }catch{
    document.getElementById('heroStrip').innerHTML='<div class="empty">// 尚無文章</div>';
    document.getElementById('mobileFeed').innerHTML='<div class="empty">// 尚無文章</div>';
  }
}

function renderDesktop(articles){
  const hero=document.getElementById('heroStrip');
  const more=document.getElementById('moreGrid');
  const bar=document.getElementById('sectionBar');
  if(!articles.length){
    hero.innerHTML='<div class="empty">// 此分類尚無文章</div>';
    more.innerHTML=''; bar.style.display='none'; return;
  }
  const first=articles[0];
  const rest=articles.slice(1);

  // Hero
  let heroHtml='<a class="hero-main" href="'+first.file+'">';
  heroHtml+='<div class="card-cover" style="overflow:hidden">'+img(first.image,first.title,'card-cover','card-cover-ph')+'</div>';
  heroHtml+='<div class="hero-body"><span class="card-tag">'+first.category+'</span>';
  heroHtml+='<div class="hero-title">'+first.title+'</div>';
  heroHtml+='<div class="hero-excerpt">'+first.excerpt+'</div>';
  heroHtml+='<span class="card-date">'+first.date+'</span></div></a>';

  // Side cards
  if(rest.length){
    heroHtml+='<div class="side-list">';
    rest.slice(0,3).forEach(function(a){
      heroHtml+='<a class="side-card" href="'+a.file+'">';
      heroHtml+='<div class="side-card-img-wrap">'+img(a.image,a.title,'side-card-img','side-card-img-ph')+'</div>';
      heroHtml+='<div class="side-card-body"><span class="side-card-tag">'+a.category+'</span>';
      heroHtml+='<div class="side-card-title">'+a.title+'</div>';
      heroHtml+='<span class="side-card-date">'+a.date+'</span></div></a>';
    });
    heroHtml+='</div>';
  }
  hero.innerHTML=heroHtml;

  // More grid
  const g=rest.slice(3);
  if(g.length){
    bar.style.display='flex';
    let gridHtml='<div class="grid-3">';
    g.forEach(function(a){
      gridHtml+='<a class="grid-card" href="'+a.file+'">';
      gridHtml+='<div style="width:140px;flex-shrink:0;overflow:hidden;background:#1a1a1a">'+img(a.image,a.title,'card-cover','card-cover-ph')+'</div>';
      gridHtml+='<div class="grid-body"><span class="card-tag">'+a.category+'</span>';
      gridHtml+='<div class="grid-title">'+a.title+'</div>';
      if(a.excerpt) gridHtml+='<div style="font-size:0.78rem;color:var(--light);line-height:1.65;margin-top:0.3rem">'+a.excerpt+'</div>';
      gridHtml+='<span class="card-date" style="display:block;margin-top:0.35rem">'+a.date+'</span>';
      gridHtml+='</div></a>';
    });
    gridHtml+='</div>';
    more.innerHTML=gridHtml;
  } else {
    bar.style.display='none'; more.innerHTML='';
  }
}

function renderMobile(articles){
  const feed=document.getElementById('mobileFeed');
  if(!articles.length){feed.innerHTML='<div class="empty">// 此分類尚無文章</div>';return;}
  const first=articles[0];
  const rest=articles.slice(1);

  let html='<a class="m-hero" href="'+first.file+'">';
  html+='<div class="m-hero-img-wrap">';
  if(first.image){
    html+='<img class="m-hero-img" src="'+first.image+'" alt="'+first.title+'" onerror="this.style.visibility='hidden';this.parentElement.style.background='#1a1a1a'">';
  } else {
    html+='<div class="m-hero-img-ph"><span>哥吉拉</span></div>';
  }
  html+='</div>';
  html+='<div class="m-hero-label"><div class="m-hero-label-line"></div><span class="m-hero-label-text">'+first.category+'</span></div>';
  html+='<div class="m-hero-title">'+first.title+'</div>';
  html+='<p class="m-hero-excerpt">'+first.excerpt+'</p>';
  html+='<div class="m-hero-meta"><span class="m-hero-date">'+first.date+'</span><span class="m-hero-arrow">→</span></div></a>';

  // Two col
  const two=rest.slice(0,2);
  if(two.length){
    html+='<div class="m-two-col">';
    two.forEach(function(a){
      html+='<a class="m-two-card" href="'+a.file+'">';
      html+='<div class="m-two-img" style="position:relative;overflow:hidden">';
      if(a.image){
        html+='<img src="'+a.image+'" alt="'+a.title+'" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.style.visibility='hidden';this.parentElement.style.background='#1a1a1a'">';
      }
      html+='<div class="m-two-img-tag">'+a.category+'</div></div>';
      html+='<div class="m-two-body"><div class="m-two-title">'+a.title+'</div><span class="m-two-date">'+a.date+'</span></div></a>';
    });
    html+='</div>';
  }

  // List
  const list=rest.slice(2);
  if(list.length){
    html+='<div class="m-list-header"><div class="m-list-header-line"></div><div class="m-list-header-text">最新文章</div></div>';
    list.forEach(function(a){
      html+='<a class="m-list-card" href="'+a.file+'">';
      html+='<div class="m-list-img">';
      if(a.image){
        html+='<img src="'+a.image+'" alt="'+a.title+'" style="width:100%;aspect-ratio:4/3;object-fit:cover;display:block" onerror="this.style.visibility='hidden';this.parentElement.style.background='#1a1a1a'">';
      } else {
        html+='<div class="m-list-img-ph"><span>哥</span></div>';
      }
      html+='</div>';
      html+='<div class="m-list-body"><span class="m-list-tag">'+a.category+'</span>';
      html+='<div class="m-list-title">'+a.title+'</div>';
      html+='<span class="m-list-date">'+a.date+'</span></div></a>';
    });
  }

  feed.innerHTML=html;
}

function filterArticles(cat,btn){
  document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('active');});
  if(btn) btn.classList.add('active');
  const f=cat==='全部'?allArticles:allArticles.filter(function(a){return a.category===cat;});
  renderDesktop(f); renderMobile(f);
}

function mobileCat(cat,el){
  document.querySelectorAll('.mobile-menu-item').forEach(function(i){i.classList.remove('active');});
  el.classList.add('active');
  filterArticles(cat,null);
  toggleMenu();
}

function toggleMenu(){
  const m=document.getElementById('mobileMenu');
  const b=document.getElementById('burgerBtn');
  m.classList.toggle('open');
  b.classList.toggle('open');
  document.body.style.overflow=m.classList.contains('open')?'hidden':'';
}
